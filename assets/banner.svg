    <text x="28" y="56" fill="#F8FAFC" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.3">ooodnakov</text>
    <text x="30" y="95" fill="#CBD5E1" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="17" letter-spacing="0.3">risk analysis × AI × homelab</text>
    <text x="30" y="125" fill="#94A3B8" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">quiet automation · local-first systems · practical tools</text>
