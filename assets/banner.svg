    <circle cx="194" cy="124" r="2" fill="#E5E7EB"/>
    <circle cx="1014" cy="246" r="2" fill="#E5E7EB"/>
    <circle cx="1094" cy="198" r="2" fill="#E5E7EB"/>
    <path d="M108 82L194 124M1014 246L1094 198" stroke="#E5E7EB" stroke-opacity="0.22"/>
