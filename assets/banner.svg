    <circle cx="632" cy="213" r="7" fill="#0D1117" stroke="#34D399" stroke-width="3"/>
    <circle cx="782" cy="103" r="7" fill="#0D1117" stroke="#7DD3FC" stroke-width="3"/>
    <circle cx="1038" cy="112" r="7" fill="#0D1117" stroke="#34D399" stroke-width="3"/>
