<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ooodnakov — risk analysis, AI, homelab</title>
  <desc id="desc">Minimal dark banner with a signal line, soft grid and compact profile text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080B12"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="126" y1="246" x2="1038" y2="111" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(935 80) rotate(143.7) scale(382 220)">
      <stop stop-color="#2F81F7" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2F81F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60" y="-60" width="1320" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.30 0 0 0 0 0.64 0 0 0 0 1 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#94A3B8" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="32" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="32" fill="url(#glow)"/>

  <g opacity="0.55">
