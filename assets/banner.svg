  <g filter="url(#softGlow)">
    <path d="M126 244C197 179 246 229 306 187C368 144 405 85 470 126C532 165 566 254 632 213C697 173 712 91 782 103C845 114 867 202 928 180C976 162 996 121 1038 112" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <path d="M126 244C197 179 246 229 306 187C368 144 405 85 470 126C532 165 566 254 632 213C697 173 712 91 782 103C845 114 867 202 928 180C976 162 996 121 1038 112" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <g>
