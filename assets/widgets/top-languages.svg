  <rect x="254" y="60" width="66" height="10" rx="5" fill="#3572A5" />
  <rect x="320" y="60" width="37" height="10" rx="5" fill="#A97BFF" />
  <rect x="357" y="60" width="17" height="10" rx="5" fill="#89e051" />
  <rect x="374" y="60" width="14" height="10" rx="5" fill="#8b949e" />
  <circle cx="27" cy="94" r="5" fill="#DA5B0B" />
  <text class="text" x="40" y="98">Jupyter Notebook 41.2%</text>
  <circle cx="27" cy="116" r="5" fill="#3178c6" />
  <text class="text" x="40" y="120">TypeScript 17.7%</text>
